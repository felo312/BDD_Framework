<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Dashboard | Inicio de Sesión</title>
    <meta name="description" content="Sistema de gestión avanzada para restaurantes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <div class="background-mesh"></div>
    
    <main class="login-container">
        <div class="login-glass-card">
            <div class="logo-section">
                <div class="logo-circle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path>
                        <path d="M7 2v20"></path>
                        <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path>
                    </svg>
                </div>
                <h1>Gourmet <span>System</span></h1>
                <p>Gestión inteligente de tu restaurante</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="error-message" id="errorMessage">
                    Credenciales incorrectas. Intenta de nuevo.
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <div class="spinner" id="btnSpinner" style="display: none;"></div>
                </button>
            </form>
        </div>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
